[build]
  command = "npm run build"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/landscape"
  to = "/.netlify/functions/landscape"
  status = 200

[[redirects]]
  from = "/api/image"
  to = "/.netlify/functions/image"
  status = 200

[[redirects]]
  from = "/api/plan/create-session"
  to = "/.netlify/functions/plan-create-session"
  status = 200

[[redirects]]
  from = "/api/plan/status"
  to = "/.netlify/functions/plan-status"
  status = 200

[[redirects]]
  from = "/api/plan/verify"
  to = "/.netlify/functions/plan-verify"
  status = 200
